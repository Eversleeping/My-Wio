services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: wio
      POSTGRES_USER: wio
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wio"]
      interval: 5s
      timeout: 3s
      retries: 20

  controlplane:
    build:
      context: ..
      dockerfile: deploy/controlplane.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      WIO_ADDR: :8080
      WIO_DATABASE_URL: ${WIO_DATABASE_URL:?set WIO_DATABASE_URL}
      WIO_MASTER_KEY: ${WIO_MASTER_KEY:?set WIO_MASTER_KEY}
      WIO_PUBLIC_URL: https://${WIO_DOMAIN:?set WIO_DOMAIN}
      WIO_AGENT_DIAL_ADDRESS: ${WIO_AGENT_DIAL_ADDRESS:-}
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8080/api/health"]
      interval: 10s
      timeout: 3s
      retries: 12

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    depends_on:
      controlplane:
        condition: service_healthy
    environment:
      WIO_DOMAIN: ${WIO_DOMAIN:?set WIO_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
